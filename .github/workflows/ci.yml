name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ci-cd-portfolio .

      - name: Run Container
        run: |
          docker run -d -p 5000:5000 --name portfolio ci-cd-portfolio

      - name: Test Application
        run: |
          sleep 5
          curl http://localhost:5000

      - name: Stop Container
        run: docker stop portfolio